services:
  foundrai:
    build: .
    ports:
      - "8420:8420"
    env_file:
      - .env
    volumes:
      - foundrai-data:/app/.foundrai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/api/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  foundrai-data:
