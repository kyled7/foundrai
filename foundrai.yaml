project:
  name: my-project
  description: ''
team:
  product_manager:
    enabled: true
    model: anthropic/claude-sonnet-4-20250514
    autonomy: notify
    max_tokens_per_action: 4096
    persona_override: null
  architect:
    enabled: true
    model: anthropic/claude-sonnet-4-20250514
    autonomy: require_approval
    max_tokens_per_action: 4096
    persona_override: null
  developer:
    enabled: true
    model: anthropic/claude-sonnet-4-20250514
    autonomy: auto_approve
    max_tokens_per_action: 8192
    persona_override: null
    approval_conditions:
      require_approval_if:
        lines_changed_gte: 50
  qa_engineer:
    enabled: true
    model: anthropic/claude-sonnet-4-20250514
    autonomy: auto_approve
    max_tokens_per_action: 4096
    persona_override: null
  designer:
    enabled: false
    model: anthropic/claude-sonnet-4-20250514
    autonomy: notify
    max_tokens_per_action: 4096
  devops:
    enabled: false
    model: openai/gpt-4o-mini
    autonomy: require_approval
    max_tokens_per_action: 4096
sprint:
  max_tasks_parallel: 3
  token_budget: 100000
  max_sprints: 5
  auto_start_next: false
persistence:
  database: sqlite
  sqlite_path: .foundrai/data.db
memory:
  provider: chromadb
  chromadb_path: .foundrai/vectors
  embedding_model: default
sandbox:
  provider: docker
  timeout_seconds: 30
  max_memory_mb: 512
server:
  host: 0.0.0.0
  port: 8420
  cors_origins:
  - http://localhost:5173
logging:
  level: INFO
  file: .foundrai/logs/foundrai.log
budget:
  sprint_budget_usd: 5.0
  warning_threshold: 0.75
  model_tierdown_map:
    anthropic/claude-sonnet-4-20250514: anthropic/claude-haiku-20250513
  agent_budgets:
    product_manager: 2.0
    developer: 3.0
